aid: payhip
name: Payhip
review:
  question: Does Payhip expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Payhip's public developer surface is a
    request/response REST API (base https://payhip.com/api/v2) plus outbound
    webhooks. The webhooks are server-to-endpoint HTTP POSTs that Payhip sends to
    a URL the seller configures; they are not a bidirectional or streaming
    WebSocket transport and there is no ws:// or wss:// endpoint clients connect
    to. Webhook event shapes (paid, refunded, subscription.created,
    subscription.deleted) are documented in the OpenAPI's webhooks section rather
    than as a separate AsyncAPI document.
findings:
  summary: |
    Payhip does not publish a documented public WebSocket API. Payhip is a
    creator e-commerce platform (digital products, courses, memberships,
    coupons, physical goods). Its public developer surface has two parts: a
    REST API and outbound webhooks. The REST API (base
    https://payhip.com/api/v2) currently exposes only two resource families -
    Coupons and software License Keys. Coupon calls authenticate with the
    account API key via the payhip-api-key header; license calls authenticate
    with a per-product secret key via the product-secret-key header. Responses
    are JSON wrapped in a data object. A request without a key returns HTTP 401,
    confirming the API is live and self-serve (keys are issued from the
    Developer Settings page - no sales gate). Order, customer, and transaction
    data is not exposed as a pollable REST resource; it is delivered through
    signed webhooks. No realtime, bidirectional, or streaming WebSocket endpoint
    is documented anywhere on Payhip's developer surface.
  accessModel: |
    Public and self-serve. Developer documentation is openly readable at
    payhip.com/api-reference and help.payhip.com (Developer category). API keys
    and per-product secret keys are generated by any account holder from
    Settings > Developer. No partner approval or sales contact is required to
    call the API. The REST surface is intentionally narrow today - Payhip's
    own help center states the API "currently supports managing coupons and
    license keys" with more planned.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://payhip.com/api/v2
      documented: true
      note: Coupons and License Keys. JSON responses wrapped in a data object.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outbound HTTP POST to a seller-configured URL for paid, refunded, subscription.created, and subscription.deleted events. Server-to-endpoint HTTP, not WebSocket. Signature = hash('sha256', apiKey). Failed deliveries retry hourly for up to three hours; endpoint must return HTTP 200.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Payhip's API reference or developer help center as of the review date.
  endpointsConfirmedRest:
    - POST https://payhip.com/api/v2/coupons
    - GET  https://payhip.com/api/v2/coupons
    - GET  https://payhip.com/api/v2/coupons/{id}
    - GET  https://payhip.com/api/v2/license/verify
    - PUT  https://payhip.com/api/v2/license/enable
    - PUT  https://payhip.com/api/v2/license/disable
    - PUT  https://payhip.com/api/v2/license/usage
    - PUT  https://payhip.com/api/v2/license/decrease
  webhookEventsConfirmed:
    - paid
    - refunded
    - subscription.created
    - subscription.deleted
  endpointsModeled:
    note: |
      The REST paths, HTTP methods, and resource fields above are taken directly
      from Payhip's published API reference and webhooks help article. The
      OpenAPI request/response schemas expand documented field names into typed
      properties; exact enum values, nullability, and full field coverage for
      coupon and license payloads were normalized from the reference and should
      be reconciled against a live account response. No Products, Customers, or
      Transactions REST endpoints exist to model - that data flows only through
      the webhook payloads.
sources:
  - url: https://payhip.com/api-reference
    type: APIReference
    note: Base URL https://payhip.com/api/v2, API-key and product-secret-key auth, Coupons and License Keys endpoints and fields.
  - url: https://help.payhip.com/article/347-public-api
    type: Documentation
    note: States the public API currently supports managing coupons and license keys, with more planned.
  - url: https://help.payhip.com/article/115-webhooks
    type: Documentation
    note: Webhook event types (paid, refunded, subscription.created, subscription.deleted), sha256(apiKey) signature, cents-based amounts, retry behavior.
  - url: https://help.payhip.com/category/48-developer
    type: Documentation
    note: Developer help center category (API and webhooks articles).
  - url: https://payhip.com/pricing
    type: Pricing
    note: Free (5% per-sale fee), Plus ($29/mo, 2% fee), Pro ($99/mo, 0% fee); processor fees separate.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Payhip's public API is request/response
    REST (Coupons, License Keys) plus outbound signed webhooks. No AsyncAPI
    document was created because there is no server-push WebSocket transport to
    model; the event delivery is one-way HTTP webhooks, which are captured in the
    OpenAPI webhooks section and described here.

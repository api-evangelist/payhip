alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Payhip
serviceCategory: E-commerce Platform
billingModel:
  pricingCategory: Subscription plus Transaction Fee
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
meters:
- name: platform_subscription
  description: Fixed monthly platform fee for the chosen plan (Free/Plus/Pro).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: transaction_fee
  description: Payhip's percentage fee applied per sale (5% Free, 2% Plus, 0% Pro).
  unit: percent
  aggregation: sum
  dimensions:
  - account
  - product
- name: processor_fee
  description: Payment processor fees (Stripe/PayPal) charged per transaction; outside Payhip's invoice.
  unit: percent
  aggregation: sum
  dimensions:
  - account
  - processor
principles:
- name: Visibility
  description: Track monthly sales volume and the blended cost of subscription plus Payhip transaction fee plus processor fee.
- name: Allocation
  description: Attribute transaction fees per product/storefront to see which offerings carry the most fee load.
- name: Optimization
  description: Match plan tier to monthly revenue - Free at low volume, Plus mid-volume, Pro at high volume - so the combined subscription and transaction fee is minimized.
- name: Accountability
  description: Review plan choice against actual monthly sales periodically; upgrade or downgrade as revenue crosses the tier break-even points.

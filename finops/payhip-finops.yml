- FOCUS
description: >-
  FinOps view of Payhip spend. Payhip is billed as a platform subscription plus a
  percentage transaction fee on sales, not as a metered API. Cost is driven by two
  levers: the chosen plan's monthly fee (Free $0, Plus $29, Pro $99) and the
  per-sale Payhip fee (5%, 2%, or 0% respectively), layered on top of the payment
  processor's own fees (Stripe/PayPal). The public API and webhooks add no
  incremental usage charge - they are a feature of the account. There is no
  per-request API meter to optimize; cost optimization is about matching plan tier
  to monthly sales volume so the blended (subscription + transaction) cost is
  minimized.
notes: >-
  Payhip fees verified from payhip.com/pricing. Payment processor fees are set by
  Stripe/PayPal and are outside Payhip's invoice. Break-even between tiers depends
  on monthly revenue (Free is cheapest at low volume; Plus and Pro win as volume
  grows).
